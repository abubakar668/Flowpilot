name: Build Backend Image
on:
  push:
    tags:
      - 'r**'
    # branches:
    #   - v3.0.1
jobs:
  build_task:
    name: Build Task
    runs-on: ubuntu-latest
    steps:
      -
        name: Checkout
        uses: actions/checkout@v4
      -
        name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      -
        name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      -
        name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      -
        name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker_compose_deploy/flowpilot-backend/Dockerfile
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          push: true
          # tags: abubakarkhalid637/flowpilot-backend:latest,abubakarkhalid637/flowpilot-backend:${{ github.ref_name }}
          tags: abubakarkhalid637/flowpilot-backend:${{ github.ref_name }}
